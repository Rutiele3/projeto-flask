<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Paciente</title>

    <link href="{{ url_for('static', filename='bootstrap/bootstrap.min.css') }}" rel="stylesheet">
</head>

<body>
    <h2>Cadastrar Paciente</h2>

    <form method="POST" >

        <div class="mb-3">
            <label class="form-label">Nome
                <input type="text" name="nome" class="form-control" required>
            </label>
        </div>

        <div class="mb-3">
            <label class="form-label">CPF
                <input type="text" name="cpf" class="form-control" required>
            </label>
        </div>

        <div class="mb-3">
            <label class="form-label">Telefone
                <input type="text" name="telefone" class="form-control" required>
            </label>
        </div>

        <button type="submit" class="btn btn-success">Salvar</button>
        <button type="button" class="btn btn-secondary" onclick="window.location.href='/clientes'">Voltar</button>
    </form>

</body>
<script src="{{ url_for('static', filename='bootstrap/bootstrap.bundle.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/criarCliente.js') }}"></script>

</html>
